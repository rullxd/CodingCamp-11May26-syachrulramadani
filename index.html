<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <button id="themeToggle">🌙</button>
        </header>

        <section class="balance-card">
            <p>Total Balance</p>
            <h2 id="totalBalance">Rp 0</h2>
            <small id="limitWarning"></small>
        </section>

        <section class="card">
            <h3>Add Transaction</h3>

            <form id="transactionForm">
                <label>Item Name</label>
                <input type="text" id="itemName" placeholder="Example: Lunch" />

                <label>Amount</label>
                <input type="number" id="amount" placeholder="Example: 25000" />

                <label>Category</label>
                <select id="category">
                    <option value="">Choose category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Fun">Fun</option>
                </select>

                <label>Spending Limit</label>
                <input type="number" id="spendingLimit" placeholder="Example: 100000" />

                <button type="submit">Add Transaction</button>
            </form>
        </section>

        <section class="grid">
            <div class="card">
                <div class="section-title">
                    <h3>Transactions</h3>
                    <select id="sortOption">
                        <option value="newest">Newest</option>
                        <option value="amount">Amount</option>
                        <option value="category">Category</option>
                    </select>
                </div>

                <div id="transactionList" class="transaction-list"></div>
            </div>

            <div class="card">
                <h3>Spending by Category</h3>
                <canvas id="expenseChart"></canvas>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
